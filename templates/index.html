<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NeuroLingo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-mark">N</div>
            <span class="logo-text">NeuroLingo</span>
        </div>

        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" onclick="showTranslator(this)">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 8l6 6M4 14l6-6 2-2M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6"/></svg>
                Translator
            </a>
            <a href="#" class="nav-item" onclick="showHistory(this)">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                History
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="theme-toggle" onclick="toggleDark()" id="themeBtn">
                <div class="toggle-track">
                    <div class="toggle-thumb"></div>
                </div>
                <span id="themeLabel">Light</span>
            </div>
        </div>
    </aside>

    <main class="main">

        <div class="panel" id="translator">
            <div class="panel-header">
                <h1 class="panel-title">Translate</h1>
                <p class="panel-subtitle">techwithsuryansh</p>
            </div>

            <div class="translator-body">
                <div class="lang-bar">
                    <div class="lang-select" id="sourceDropdown"></div>
                    <button class="swap-btn" onclick="swapLanguages()" title="Swap languages">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
                    </button>
                    <div class="lang-select" id="targetDropdown"></div>
                </div>

                <div class="text-panels">

                    <div class="text-panel source-panel">
                        <div class="panel-label">Source</div>
                        <textarea id="input_text" placeholder="Type something to translate…" spellcheck="false"></textarea>
                        <div class="panel-bottom-row">
                            <span class="char-count" id="charCount">0</span>
                            <button class="copy-btn" onclick="copyText('input_text', this)">
                                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                                Copy
                            </button>
                        </div>
                    </div>

                    <div class="divider-line"></div>

                    <div class="text-panel target-panel">
                        <div class="panel-label">Translation</div>
                        <div class="loading" id="loading">
                            <div class="dots"><span></span><span></span><span></span></div>
                        </div>
                        <div id="output_text" class="output-text"></div>
                        <div class="panel-bottom-row">
                            <span></span>
                            <button class="copy-btn" onclick="copyText('output_text', this)">
                                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                                Copy
                            </button>
                        </div>
                    </div>

                </div>

                <div class="action-bar">
                    <button class="btn btn-primary" onclick="translateText()">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 8l6 6M4 14l6-6 2-2M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6"/></svg>
                        Translate
                    </button>
                    <button class="btn btn-ghost" onclick="startSpeech()">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>
                        Mic
                    </button>
                    <button class="btn btn-ghost" onclick="speakText()">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                        Speak
                    </button>
                </div>
            </div>
        </div>

        <div class="panel" id="history" style="display:none;">
            <div class="panel-header">
                <h1 class="panel-title">History</h1>
                <p class="panel-subtitle">Your recent translations</p>
            </div>
            <div id="history_list" class="history-list"></div>
        </div>

    </main>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
